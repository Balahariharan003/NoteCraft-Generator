<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notes Generator</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>

  <div class="header">
    <div class="logo">
      <div class="logo-dot"></div>
      <span class="logo-text">Notes Generator</span>
    </div>
  </div>

  <!-- IDLE -->
  <div id="state-idle" class="state active">
    <p class="hint">Open Google Meet and click Start Recording.</p>
    <button id="btn-start" class="btn btn-primary">Start Recording</button>
  </div>

  <!-- RECORDING -->
  <div id="state-recording" class="state">
    <div class="recording-indicator">
      <div class="pulse-dot"></div>
      <span>Recording</span>
    </div>
    <div id="timer" class="timer">00:00:00</div>
    <p class="hint-small">Audio is being captured live.</p>
    <button id="btn-stop" class="btn btn-danger">End Meeting</button>
  </div>

  <!-- PROCESSING -->
  <div id="state-processing" class="state">
    <div class="spinner"></div>
    <p id="processing-text" class="status-text">Processing meeting...</p>
    <p class="hint-small">Please wait. Do not close this window.</p>
  </div>

  <!-- READY -->
  <div id="state-ready" class="state">
    <div class="success-icon">&#10003;</div>
    <p class="status-text">Notes is ready!</p>
    <div class="download-buttons">
      <a id="btn-docx" class="btn btn-download" target="_blank">Download DOCX</a>
    </div>
    <button id="btn-new" class="btn btn-ghost">New Recording</button>
  </div>

  <!-- ERROR -->
  <div id="state-error" class="state">
    <div class="error-icon">&#10007;</div>
    <p class="status-text">Processing failed.</p>
    <p class="hint-small">Please retry.</p>
    <button id="btn-retry" class="btn btn-primary">Retry</button>
    <button id="btn-new-error" class="btn btn-ghost">Start New</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
